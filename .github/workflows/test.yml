name: Run tests
on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        subproject:
          - 1.21.11-fabric
          - 1.21.11-neoforge
        side:
          - Host
          - Joiner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get cache key
        id: cache_key
        run: echo "gradle_key=gradle-v2-`cat versions/mainProject`-loom-1.13.467" >> $GITHUB_OUTPUT
      - name: Cache Gradle stuff
        uses: actions/cache@v4
        with:
          key: ${{ steps.cache_key.outputs.gradle_key }}-${{ hashFiles('*.gradle.kts', 'gradle.properties', 'gradle/**') }}
          restore-keys: ${{ steps.cache_key.outputs.gradle_key }}-
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/loom-cache
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
      - name: Run tests
        run: xvfb-run -a -s "-screen 0 1920x1080x24" ./gradlew :${{ matrix.subproject }}:runTest${{ matrix.side }}
